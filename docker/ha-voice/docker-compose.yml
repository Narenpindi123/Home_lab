version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: local_ollama
    restart: unless-stopped
    ports:
      - 11434:11434
    volumes:
      - ./ollama_data:/root/.ollama

  whisper:
    image: rhasspy/wyoming-whisper:latest
    container_name: wyoming_whisper
    restart: unless-stopped
    ports:
      - 10300:10300
    command: [
      "--model", "tiny-int8",
      "--language", "en"
    ]
    volumes:
      - ./whisper_data:/data

  piper:
    image: rhasspy/wyoming-piper:latest
    container_name: wyoming_piper
    restart: unless-stopped
    ports:
      - 10200:10200
    command: [
      "--voice", "en_US-lessac-medium"
    ]
    volumes:
      - ./piper_data:/data
