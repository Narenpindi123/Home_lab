services:
  vikunja:
    image: vikunja/vikunja
    container_name: vikunja
    restart: unless-stopped
    environment:
      VIKUNJA_SERVICE_PUBLICURL: http://<REDACTED_IP>:3456
      VIKUNJA_DATABASE_HOST: db
      VIKUNJA_DATABASE_PASSWORD: <REDACTED>
      VIKUNJA_DATABASE_TYPE: postgres
      VIKUNJA_DATABASE_USER: vikunja
      VIKUNJA_DATABASE_DATABASE: vikunja
      VIKUNJA_SERVICE_JWTSECRET: <REDACTED>
      VIKUNJA_SERVICE_ENABLEREGISTRATION: "true"
    ports:
      - 3456:3456
    volumes:
      - /home/naren/homelab/docker/vikunja/files:/app/vikunja/files
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  db:
    image: postgres:16
    container_name: vikunja_db
    restart: unless-stopped
    shm_size: 256mb
    environment:
      POSTGRES_PASSWORD: <REDACTED>
      POSTGRES_USER: vikunja
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=128MB"
      - "-c"
      - "work_mem=8MB"
      - "-c"
      - "effective_cache_size=256MB"
      - "-c"
      - "synchronous_commit=off"
      - "-c"
      - "wal_buffers=4MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "random_page_cost=1.1"
    volumes:
      - /home/naren/homelab/docker/vikunja/db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U $$POSTGRES_USER"]
      interval: 2s
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
