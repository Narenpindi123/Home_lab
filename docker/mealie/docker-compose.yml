services:
  mealie:
    image: ghcr.io/mealie-recipes/mealie:v1.12.0
    container_name: mealie
    restart: always
    ports:
      - "9925:9000"
    environment:
      - TZ=America/New_York
      - ALLOW_SIGNUP=true
      - PUID=1000
      - PGID=1000
      - MAX_WORKERS=1
      - WEB_CONCURRENCY=1
      - OPENAI_BASE_URL=http://<REDACTED_IP>:11434/v1
      - OPENAI_API_KEY= <REDACTED>
      - OPENAI_MODEL=llama3.1:8b
    volumes:
      - ./mealie-data:/app/data/
